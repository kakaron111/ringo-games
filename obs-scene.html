<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OBS説明シーン — りんごちゃんゲーム</title>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  OBS 説明シーン（配信者が「今からこれやります」と説明する用）      ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  OBSブラウザソース設定:                                            ║
  ║    URL  : このファイルのパス または http://localhost:PORT/promo/obs-scene.html
  ║    幅    : 1920   高さ: 1080                                       ║
  ║                                                                    ║
  ║  表示するゲームの指定:                                              ║
  ║    obs-scene.html?game=slot   のように ?game=ID を付ける           ║
  ║    （ID は games.js の id 。例: slot / racing / Trade / gokudou）   ║
  ║                                                                    ║
  ║  ブラウザで開いてプレビューするとき:                                ║
  ║    ← → キー … 前/次のゲームへ切替                                  ║
  ║    数字キー1〜9 … その番号のゲームへジャンプ                        ║
  ║    A キー … 全ゲーム自動スライド（10秒ごと）ON/OFF                  ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  /* ビューポートを埋めて中央寄せ。はみ出した余白は黒のレターボックスに */
  html,body{width:100%;height:100%;overflow:hidden;background:#0d0712;
    display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,sans-serif}
  /* ステージは常に実寸1920×1080。JSでウィンドウに合わせて縮小（OBSは等倍） */
  .stage{
    width:1920px;height:1080px;flex:none;transform-origin:center center;
    position:relative;color:#fff5f8;
    background:
      radial-gradient(1400px 800px at 22% 18%, var(--glow,#5a2a44) 0%, transparent 55%),
      linear-gradient(135deg,#1a1020 0%,#2a1430 55%,#1c0f24 100%);
    display:flex;align-items:center;
  }
  /* 左の大きな絵文字パネル */
  .visual{
    width:760px;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:30px;position:relative;
  }
  .visual::after{content:"";position:absolute;right:0;top:140px;bottom:140px;width:2px;
    background:linear-gradient(180deg,transparent,var(--ac,#ff5a7a),transparent)}
  .emoji{font-size:300px;line-height:1;filter:drop-shadow(0 14px 34px rgba(0,0,0,.55));
    animation:float 4s ease-in-out infinite}
  @keyframes float{50%{transform:translateY(-22px)}}
  /* 実ゲーム画面のサムネ */
  .shot{width:600px;height:338px;border-radius:22px;object-fit:cover;
    border:4px solid var(--ac,#ff5a7a);box-shadow:0 22px 50px rgba(0,0,0,.55);
    background:#160c1d;display:none}
  .shot.show{display:block}
  .shot.show + .emoji{display:none}
  .genre-chip{font-size:26px;letter-spacing:.1em;color:var(--ac,#ff5a7a);
    border:2px solid var(--ac,#ff5a7a);border-radius:999px;padding:8px 28px}

  /* 右のテキスト */
  .body{flex:1;padding:0 96px 0 76px}
  h1{font-size:74px;line-height:1.12;letter-spacing:.01em;margin-bottom:18px;
    text-shadow:0 4px 20px rgba(0,0,0,.4)}
  .tagline{font-size:34px;font-weight:700;color:var(--ac,#ff5a7a);margin-bottom:22px}
  .desc{font-size:27px;line-height:1.7;color:#e9cede;max-width:880px;margin-bottom:40px}

  /* 人数・プレイ時間チップ */
  .meta{display:flex;gap:16px;margin:0 0 28px}
  .meta .chip{display:inline-flex;align-items:center;gap:10px;font-size:24px;color:#e9cede;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
    padding:9px 22px;border-radius:999px}
  .meta .chip b{color:#fff;font-weight:700}
  .portrait .meta{gap:22px;margin:4px 0 34px}
  .portrait .meta .chip{font-size:32px;padding:12px 28px}

  /* 参加方法ボックス */
  .join{background:rgba(0,0,0,.28);border:2px solid var(--ac,#ff5a7a);
    border-radius:24px;padding:30px 38px;max-width:920px}
  .join .lbl{font-size:24px;font-weight:700;color:var(--ac,#ff5a7a);
    letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:12px}
  .join .lbl .play{width:0;height:0;border-left:18px solid var(--ac,#ff5a7a);
    border-top:11px solid transparent;border-bottom:11px solid transparent}
  .join .txt{font-size:29px;line-height:1.6}
  .join .reward{margin-top:18px;font-size:25px;color:#e9cede;display:flex;align-items:center;gap:14px}
  .join .reward b{font-size:30px;color:#fff;background:var(--ac,#ff5a7a);
    padding:7px 24px;border-radius:12px;font-weight:800;
    box-shadow:0 6px 18px rgba(0,0,0,.35)}

  /* 上部の通し帯 */
  .top-bar{position:absolute;top:46px;left:760px;right:96px;
    display:flex;align-items:center;justify-content:space-between;font-size:22px;color:#c9a7bd}
  .top-bar .brand{font-weight:800;color:#fff;letter-spacing:.04em}
  .top-bar .brand .a{color:#ff5a7a}
  .top-bar .idx{letter-spacing:.1em}

  /* 下部の進行ドット */
  .dots{position:absolute;bottom:42px;left:836px;display:flex;gap:12px}
  .dots i{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.22);transition:.2s}
  .dots i.on{background:var(--ac,#ff5a7a);transform:scale(1.25)}

  /* ページ送りボタン（一覧から開いたとき=?nav=1 のときだけ表示。OBSでは出ない） */
  .nav{display:none;position:absolute;top:50%;transform:translateY(-50%);z-index:10;
    width:104px;height:104px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(0,0,0,.42);color:#fff;font-size:64px;line-height:1;
    align-items:center;justify-content:center;backdrop-filter:blur(3px);transition:background .15s}
  .nav:hover{background:rgba(0,0,0,.66)}
  .nav:active{transform:translateY(-50%) scale(.92)}
  .nav.prev{left:34px}
  .nav.next{right:34px}
  body.shownav .nav{display:flex}
  body.shownav .dots i{cursor:pointer}
  /* 縦画面では下寄りに大きく */
  .portrait .nav{width:128px;height:128px;font-size:78px;top:auto;bottom:150px;transform:none}
  .portrait .nav:active{transform:scale(.92)}
  .portrait .nav.prev{left:60px}
  .portrait .nav.next{right:60px}

  /* ════════ スマホ縦画面レイアウト（?orient=portrait / 1080×1920）════════ */
  .portrait .stage{width:1080px;height:1920px;flex-direction:column;align-items:stretch}
  .portrait .top-bar{position:static;left:auto;right:auto;top:auto;padding:60px 64px 0;font-size:30px}
  .portrait .visual{width:100%;height:auto;flex-direction:column;padding:44px 64px 8px;gap:28px}
  .portrait .visual::after{display:none}
  .portrait .shot{width:952px;height:535px}
  .portrait .emoji{font-size:340px}
  .portrait .genre-chip{font-size:32px;padding:10px 34px}
  .portrait .body{flex:1;padding:10px 64px 0;display:flex;flex-direction:column}
  .portrait h1{font-size:84px;margin-bottom:22px}
  .portrait .tagline{font-size:46px;margin-bottom:26px}
  .portrait .desc{font-size:38px;max-width:none;margin-bottom:44px}
  .portrait .join{max-width:none;padding:38px 46px}
  .portrait .join .lbl{font-size:32px}
  .portrait .join .txt{font-size:38px}
  .portrait .join .reward{font-size:32px}
  .portrait .join .reward b{font-size:38px}
  .portrait .dots{position:static;left:auto;bottom:auto;justify-content:center;margin:auto 0 70px}
  .portrait .dots i{width:18px;height:18px}

</style>
</head>
<body>
<div class="stage" id="stage">

  <div class="top-bar">
    <div class="brand">🍎 りんご<span class="a">ちゃん</span> GAMES</div>
    <div class="idx" id="idx"></div>
  </div>

  <div class="visual">
    <img class="shot" id="shot" alt="">
    <div class="emoji" id="emoji">🎰</div>
    <div class="genre-chip" id="genre">ジャンル</div>
  </div>

  <div class="body">
    <h1 id="name">ゲーム名</h1>
    <div class="tagline" id="tagline">キャッチコピー</div>
    <div class="meta">
      <span class="chip">👤 <b id="players">人数</b></span>
      <span class="chip">⏱ <b id="playtime">時間</b></span>
    </div>
    <div class="desc" id="desc">説明文</div>

    <div class="join">
      <div class="lbl"><span class="play"></span>参加方法</div>
      <div class="txt" id="how">参加方法の説明</div>
      <div class="reward" id="rewardRow">
        交換するチャンネルポイント報酬 → <b id="reward">報酬名</b>
      </div>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <button class="nav prev" id="prev" aria-label="前のゲーム">‹</button>
  <button class="nav next" id="next" aria-label="次のゲーム">›</button>
</div>

<script src="games.js"></script>
<script>
  const TIME_ORDER = { '短い': 0, '普通': 1, '長い': 2 };
  const games = (window.RINGO_GAMES || [])
    .filter(g => g.status !== '非公開')
    .sort((a, b) => (TIME_ORDER[a.playtime] ?? 9) - (TIME_ORDER[b.playtime] ?? 9));
  let i = 0, auto = null;

  const params = new URLSearchParams(location.search);
  // URL ?game=ID で初期表示を決める
  const want = params.get('game');
  if (want){ const f = games.findIndex(g => g.id === want); if (f >= 0) i = f; }

  // URL ?orient=portrait でスマホ縦画面レイアウトに切替（1080×1920）
  const portrait = params.get('orient') === 'portrait';
  if (portrait) document.body.classList.add('portrait');

  // URL ?nav=1 でページ送りボタン＋ドット操作を表示（一覧から開いたとき。OBSでは出さない）
  const showNav = params.get('nav') === '1';
  if (showNav) document.body.classList.add('shownav');

  const $ = id => document.getElementById(id);

  function render(){
    const g = games[i]; if(!g) return;
    document.getElementById('stage').style.setProperty('--ac', g.accent);
    document.getElementById('stage').style.setProperty('--glow', g.accent + '55');
    $('emoji').textContent  = g.emoji;
    // 実ゲーム画面サムネ（読み込めたら表示・失敗したら絵文字にフォールバック）
    const shot = $('shot');
    shot.classList.remove('show');
    shot.onload  = () => shot.classList.add('show');
    shot.onerror = () => shot.classList.remove('show');
    shot.src = g.img || `thumbs/${g.id}.png`;
    $('genre').textContent  = g.genre;
    $('name').textContent   = g.name;
    $('tagline').textContent= g.tagline;
    $('desc').textContent   = g.desc;
    $('how').textContent    = g.how;
    $('players').textContent = g.players || '';
    $('playtime').textContent = g.playtime || '';
    $('idx').textContent    = `${String(i+1).padStart(2,'0')} / ${String(games.length).padStart(2,'0')}`;
    // 交換するチャンネルポイント報酬はタイトルと同じ
    $('reward').textContent = g.name;
    $('dots').innerHTML = games.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join('');
  }

  function go(n){ i = (n + games.length) % games.length; render(); }

  // 送りボタン／ドットのタップ操作
  $('prev').addEventListener('click', () => go(i - 1));
  $('next').addEventListener('click', () => go(i + 1));
  $('dots').addEventListener('click', e => {
    const idx = [...$('dots').children].indexOf(e.target);
    if (idx >= 0) go(idx);
  });

  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight') go(i+1);
    else if(e.key==='ArrowLeft') go(i-1);
    else if(e.key>='1' && e.key<='9'){ const n=+e.key-1; if(n<games.length) go(n); }
    else if(e.key.toLowerCase()==='a'){
      if(auto){ clearInterval(auto); auto=null; }
      else { auto = setInterval(()=>go(i+1), 10000); }
    }
  });

  render();

  // ── 自動フィット：1920×1080のステージをウィンドウに合わせて縮小 ──
  // OBS（1920×1080ぴったり）では scale=1 となり等倍のまま。
  function fit(){
    const W = portrait ? 1080 : 1920, H = portrait ? 1920 : 1080;
    const s = Math.min(innerWidth / W, innerHeight / H);
    $('stage').style.transform = `scale(${s})`;
  }
  addEventListener('resize', fit);
  fit();
</script>
</body>
</html>
